<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance - Ongoing</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #10b981; margin-top: 0; }
        .details { color: #4b5563; margin-bottom: 30px; font-weight: bold; font-size: 1.2rem; }
        .pulse-ring {
            width: 80px; height: 80px; border-radius: 50%;
            background-color: #10b981; margin: 0 auto 30px auto;
            animation: pulse 2s infinite; display: flex;
            justify-content: center; align-items: center; color: white;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        button {
            width: 100%; padding: 1rem; background-color: #ef4444;
            color: white; border: none; border-radius: 5px; font-size: 1.1rem;
            cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <div class="pulse-ring">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="40" height="40"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
    </div>
    <h2>Session is Live</h2>
    <div class="details">{{ details }}</div>
    <p style="color: #6b7280; margin-bottom: 30px;">The AI is silently scanning the classroom in the background.</p>

    <form method="POST" action="/stop_session">
        <button type="submit">End Class & Verify</button>
    </form>
</div>

</body>
</html>
