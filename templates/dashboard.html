{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 style="margin-top: 0;">Session Setup</h2>
    <div style="margin-bottom: 20px; font-size: 1.1rem;">Welcome, {{ faculty_name }}</div>

    <form method="POST">
        <label>Academic Year</label>
        <select name="year" required>
            <option value="First Year">1st Year</option>
            <option value="Second Year">2nd Year</option>
            <option value="Third Year">3rd Year</option>
            <option value="Final Year">4th Year</option>
        </select>

        <label>Sections (Select Multiple if needed)</label>
        <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 1.2rem;">
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="A"> A</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="B"> B</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="C"> C</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="D"> D</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="E"> E</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="F"> F</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="G"> G</label>
            <label style="font-weight: normal;"><input type="checkbox" name="section" value="H"> H</label>
        </div>

        <label>Subject</label>
        <select name="subject" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 15px; box-sizing: border-box;">
            <option value="" disabled selected>Select Your Assigned Subject...</option>
            {% if my_subjects %}
                {% for subject in my_subjects %}
                    <option value="{{ subject }}">{{ subject }}</option>
                {% endfor %}
            {% else %}
                <option value="" disabled>No subjects assigned in DB. Please update profile.</option>
            {% endif %}
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Room No.</label>
                <input type="text" name="room" placeholder="e.g. 302" required>
            </div>
            <div style="flex: 1;">
                <label>Block</label>
                <select name="block" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">
                    <option value="" disabled selected>Select Block...</option>
                    <option value="Main Block">Main Block</option>
                    <option value="Civil Block">Civil Block</option>
                    <option value="Mechanical Block">Mechanical Block</option>
                    <option value="Electrical Block">Electrical Block</option>
                    <option value="Computer Science Block">Computer Science Block</option>
                    <option value="Electronics Block">Electronics Block</option>
                </select>
            </div>
        </div>

        <label>Period Number</label>
        <select name="period" required>
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
        </select>

        <button type="submit">Start Attendance</button>
    </form>
</div>
{% endblock %}
