{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 style="margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">User Profile</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="success">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="/static/known_faces/faculty/{{ prof.username }}.jpg" alt="Profile Photo" 
             style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--nav-bg);"
             onerror="this.src='https://via.placeholder.com/120?text=No+Photo'">
    </div>

    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="name" value="{{ prof.name }}" required>
        
        <label>Username</label>
        <input type="text" name="username" value="{{ prof.username }}" required>
        
        <label>Password</label>
        <input type="password" name="password" value="{{ prof.password }}" required>
        
        <label>Subjects Taught (e.g., Mathematics - Year 1, Sec A & B)</label>
        <textarea name="subjects" rows="4" style="font-family: inherit;">{{ prof.subjects }}</textarea>
        
        <button type="submit" style="background-color: #3b82f6;">Update Profile</button>
    </form>
</div>
{% endblock %}
